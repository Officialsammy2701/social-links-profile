<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  
  <main class="card">
    <div class="profile">
      <img
        class="avatar"
        src="./assets/images/avatar-jessica.jpeg"
        alt="Jessica Randall"
      />
      <div class="profile-info">
        <h1 class="name">Jessica Randall</h1>
        <p class="location">London, United Kingdom</p>
        <p class="bio">"Front-end developer and avid reader."</p>
      </div>
    </div>

    <nav class="links" aria-label="Social links">
      <a href="https://github.com/Officialsammy2701" aria-label="Visit GitHub profile">GitHub</a>
      <a href="https://www.frontendmentor.io/profile/Officialsammy2701" aria-label="Visit Frontend Mentor profile">Frontend Mentor</a>
      <a href="#" aria-label="Visit LinkedIn profile">LinkedIn</a>
      <a href="#" aria-label="Visit Twitter profile">Twitter</a>
      <a href="#" aria-label="Visit Instagram profile">Instagram</a>
    </nav>
  </main>

  <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://github.com/Officialsammy2701">Officialsammy2701</a>.
    </footer>
</body>
</html>
